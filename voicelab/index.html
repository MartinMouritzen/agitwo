<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agitwo Voice Lab - Quest for Glory I</title>
<style>
  :root{
    --bg:#0d0f12; --panel:#14181d; --panel2:#1a2028; --edge:#242c36;
    --txt:#cfd8e3; --dim:#7c8794; --acc:#e8a33d; --acc2:#5ac8fa; --good:#68d391; --bad:#f66;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--txt); font:14.5px/1.5 "Segoe UI",system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden}
  a{color:var(--acc2)}
  #bar{display:flex; align-items:center; gap:14px; padding:9px 18px; border-bottom:1px solid var(--edge); background:var(--panel)}
  #bar h1{font-size:15px; letter-spacing:.02em; font-weight:700}
  #bar h1 span{color:var(--acc)}
  #bar .stat{font-size:12.5px; color:var(--dim); margin-left:auto}
  button{font:inherit; cursor:pointer; border:1px solid var(--edge); background:var(--panel2); color:var(--txt); border-radius:8px; padding:5px 12px}
  button:hover{background:#222b36}
  button:active{transform:translateY(1px)}
  input{font:inherit; background:var(--panel2); color:var(--txt); border:1px solid var(--edge); border-radius:8px; padding:6px 11px; width:100%}
  #workarea{flex:1; display:flex; overflow:hidden; min-height:0}
  #side{width:320px; min-width:320px; border-right:1px solid var(--edge); background:var(--panel); display:flex; flex-direction:column; overflow:hidden}
  #side .top{padding:12px 14px 8px; display:flex; flex-direction:column; gap:8px}
  .fltrow{display:flex; gap:8px; align-items:center; font-size:12.5px; color:var(--dim)}
  #sidelist{flex:1; overflow-y:auto}
  .char{display:flex; align-items:center; gap:11px; padding:8px 14px; cursor:pointer; border-left:3px solid transparent}
  .char:hover{background:rgba(255,255,255,.045)}
  .char.sel{background:linear-gradient(90deg, rgba(232,163,61,.16) 0%, transparent 90%); border-left-color:var(--acc)}
  .char .av,.char img{width:42px; height:42px; border-radius:8px; object-fit:cover; flex:none; background:#232a33;
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#6a7783; font-size:15px}
  .char .nm{font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .char .ct{font-size:11.5px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .verdot{margin-left:auto; flex:none; width:9px; height:9px; border-radius:50%; background:#333c47}
  .verdot.good{background:var(--good)} .verdot.bad{background:var(--bad)}
  #main{flex:1; overflow-y:auto; padding:22px 32px 60px}
  #hdr{display:flex; gap:18px; align-items:center; margin-bottom:14px}
  #hdr .av,#hdr img{width:88px; height:88px; border-radius:14px; object-fit:cover; background:#232a33;
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#6a7783; font-size:34px; flex:none}
  #hdr h2{font-size:24px} #hdr .sub{color:var(--dim); font-size:13.5px; margin-top:2px}
  .vcard{background:var(--panel); border:1px solid var(--edge); border-radius:12px; padding:16px 18px; margin-bottom:16px}
  .vcard .vrow{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .vcard .vname{font-size:17px; font-weight:700; color:var(--acc)}
  .badge{font-size:11px; color:var(--acc2); border:1px solid var(--edge); border-radius:20px; padding:2px 10px}
  .vcard .vdesc{color:var(--dim); font-size:13.5px; margin-top:9px}
  .bigplay{background:var(--acc); color:#161006; font-weight:700; border:0}
  .bigplay:hover{background:#f2b455}
  .verdict{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:14px; padding-top:13px; border-top:1px solid var(--edge)}
  .vbtn.good.on{background:rgba(104,211,145,.16); border-color:var(--good); color:var(--good)}
  .vbtn.bad.on{background:rgba(255,102,102,.14); border-color:var(--bad); color:var(--bad)}
  .verdict input.note{max-width:340px}
  .lines h3{font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:6px 0 10px}
  .line{display:flex; gap:11px; align-items:flex-start; padding:9px 12px; background:var(--panel); border:1px solid var(--edge); border-radius:9px; margin-bottom:7px}
  .line:hover{background:var(--panel2)}
  .line button.pl{flex:none; width:30px; height:30px; border-radius:50%; padding:0; font-size:12px}
  .line button.pl.playing{background:var(--acc); color:#161006; border-color:var(--acc)}
  .line .lt{font-size:13.5px; padding-top:4px}
  #toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--edge); border-radius:10px; padding:9px 18px; font-size:13.5px; display:none; z-index:20}
  ::-webkit-scrollbar{width:10px} ::-webkit-scrollbar-thumb{background:#2a333e; border-radius:5px}
  .empty{color:var(--dim); text-align:center; margin-top:60px}
</style>
</head>
<body>
<div id="bar">
  <h1>agitwo <span>Voice Lab</span></h1>
  <span id="gtitle" style="font-size:13px;color:var(--dim)"></span>
  <span class="stat" id="stat"></span>
  <button onclick="exportVerdicts()" title="Copy your good/recast verdicts as JSON to hand back">Export verdicts</button>
</div>
<div id="workarea">
  <div id="side">
    <div class="top">
      <input id="search" placeholder="Search cast or voice…" oninput="renderSide()">
      <label class="fltrow"><input type="checkbox" id="onlyunrev" style="width:auto" onchange="renderSide()"> Only unreviewed</label>
    </div>
    <div id="sidelist"></div>
  </div>
  <div id="main"><div class="empty">Loading cast…</div></div>
</div>
<div id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const esc=t=>{const d=document.createElement('div');d.textContent=t||'';return d.innerHTML};
const initials=n=>(n||'?').replace(/\(.*/,'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const AUD='../voices/qfg1/';                 // clips live next to the lab in the web build
const PORTRAIT=id=>`portraits/${id}.png`;    // optional; falls back to initials
let CAST=[], cur=null, curAudio=null, curBtn=null;
const VERDICTS=JSON.parse(localStorage.getItem('agitwo_qfg1_verdicts')||'{}');  // id -> {v:'good'|'bad', note}

function toast(m,ms=2400){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',ms);}
function saveV(){localStorage.setItem('agitwo_qfg1_verdicts',JSON.stringify(VERDICTS));}

async function boot(){
  const d=await (await fetch('data/qfg1-cast.json',{cache:'no-store'})).json();
  CAST=d.characters; $('gtitle').textContent=d.title;
  renderSide();
  if(CAST.length) show(CAST[0].id);
}
function reviewed(){return CAST.filter(c=>VERDICTS[c.id]).length;}
function renderSide(){
  const q=$('search').value.toLowerCase().trim();
  const onlyU=$('onlyunrev').checked;
  $('stat').textContent=`${CAST.length} characters · ${reviewed()} reviewed`;
  let h='';
  for(const c of CAST){
    if(onlyU && VERDICTS[c.id]) continue;
    if(q && !(c.name.toLowerCase().includes(q)||(c.voiceName||'').toLowerCase().includes(q))) continue;
    const v=VERDICTS[c.id];
    h+=`<div class="char ${cur===c.id?'sel':''}" onclick="show('${c.id}')">
      <img class="av" src="${PORTRAIT(c.id)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'av',textContent:'${initials(c.name)}'}))">
      <div style="min-width:0;flex:1">
        <div class="nm">${esc(c.name)}</div>
        <div class="ct">${c.lineCount} lines · ${esc((c.voiceName||'').split(' -')[0].split(' (')[0])}</div>
      </div>
      <span class="verdot ${v?v.v:''}"></span></div>`;
  }
  $('sidelist').innerHTML=h||'<div class="empty" style="font-size:13px;margin-top:24px">No matches</div>';
}
function show(id){
  cur=id; renderSide();
  const c=CAST.find(x=>x.id===id); if(!c) return;
  stopAudio();
  const v=VERDICTS[id]||{};
  const badges=[c.voiceGender,c.voiceAge&&c.voiceAge.replace('_',' '),c.voiceProvider].filter(Boolean)
    .map(b=>`<span class="badge">${esc(b)}</span>`).join('');
  let h=`<div id="hdr">
    <img class="av" src="${PORTRAIT(c.id)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'av',textContent:'${initials(c.name)}'}))">
    <div><h2>${esc(c.name)}</h2><div class="sub">${c.lineCount} voiced lines</div></div></div>
  <div class="vcard">
    <div class="vrow">
      <span class="vname">${esc(c.voiceName)}</span>${badges}
      <button class="bigplay" onclick="playFirst('${c.id}')" style="margin-left:auto">&#9654; Preview voice</button>
    </div>
    ${c.voiceDesc?`<div class="vdesc">${esc(c.voiceDesc)}</div>`:''}
    <div class="verdict">
      <span style="color:var(--dim);font-size:12.5px">Does this voice fit?</span>
      <button class="vbtn good ${v.v==='good'?'on':''}" onclick="setV('${c.id}','good')">&#10003; Good fit</button>
      <button class="vbtn bad ${v.v==='bad'?'on':''}" onclick="setV('${c.id}','bad')">&#10007; Needs recast</button>
      <input class="note" placeholder="note (e.g. too young / wrong accent)…" value="${esc(v.note||'')}" onchange="setNote('${c.id}',this.value)">
    </div>
  </div>
  <div class="lines"><h3>Lines &mdash; click to hear the voice in the actual game text</h3>`;
  for(const l of c.lines){
    h+=`<div class="line">
      <button class="pl" data-f="${esc(l.file)}" onclick="playLine(this,'${esc(l.file)}')">&#9654;</button>
      <div class="lt">${esc(l.text)}</div></div>`;
  }
  if(c.lineCount>c.lines.length) h+=`<div style="color:var(--dim);font-size:12.5px;padding:6px 2px">…and ${c.lineCount-c.lines.length} more lines (showing first ${c.lines.length})</div>`;
  h+=`</div>`;
  $('main').innerHTML=h;
}
function stopAudio(){ if(curAudio){curAudio.pause();curAudio=null;} if(curBtn){curBtn.classList.remove('playing');curBtn=null;} }
function playLine(btn,file){
  const again=(curBtn===btn);
  stopAudio();
  if(again) return;
  curAudio=new Audio(AUD+file); curBtn=btn; btn.classList.add('playing');
  curAudio.onended=()=>{btn.classList.remove('playing'); if(curBtn===btn)curBtn=null;};
  curAudio.play().catch(e=>toast('play blocked: '+e.message));
}
function playFirst(id){
  const c=CAST.find(x=>x.id===id); if(!c||!c.lines.length) return;
  // pick the longest line for a meatier preview
  const best=[...c.lines].sort((a,b)=>b.text.length-a.text.length)[0];
  stopAudio(); curAudio=new Audio(AUD+best.file); curAudio.play().catch(e=>toast('play blocked: '+e.message));
  toast('Previewing: "'+best.text.slice(0,60)+(best.text.length>60?'…':'')+'"',3500);
}
function setV(id,val){
  const curv=VERDICTS[id]&&VERDICTS[id].v;
  VERDICTS[id]=VERDICTS[id]||{};
  VERDICTS[id].v = (curv===val)?undefined:val;
  if(!VERDICTS[id].v && !VERDICTS[id].note) delete VERDICTS[id];
  saveV(); show(cur);
}
function setNote(id,txt){
  VERDICTS[id]=VERDICTS[id]||{}; VERDICTS[id].note=txt.trim();
  if(!VERDICTS[id].v && !VERDICTS[id].note) delete VERDICTS[id];
  saveV(); renderSide();
}
function exportVerdicts(){
  const recast=CAST.filter(c=>VERDICTS[c.id]&&VERDICTS[c.id].v==='bad')
    .map(c=>({id:c.id,name:c.name,currentVoice:c.voiceName,note:(VERDICTS[c.id].note||'')}));
  const good=CAST.filter(c=>VERDICTS[c.id]&&VERDICTS[c.id].v==='good').map(c=>c.id);
  const out=JSON.stringify({recast,good},null,1);
  navigator.clipboard.writeText(out).then(()=>toast('Verdicts copied to clipboard ('+recast.length+' to recast)',4000))
    .catch(()=>{const w=window.open('','_blank');w.document.write('<pre>'+esc(out)+'</pre>');});
}
boot();
</script>
</body>
</html>
